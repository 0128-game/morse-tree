<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Fixed Morse Tree Trainer</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; overflow: hidden; }
        #display-area { text-align: center; margin: 10px 0; width: 100%; }
        #current-char { font-size: 50px; color: #00ff88; font-weight: bold; height: 60px; }
        #history { font-size: 18px; color: #aaa; font-family: monospace; min-height: 1.2em; }

        /* ツリー表示エリア（固定） */
        #screen { 
            width: 98vw; 
            height: 65vh; 
            position: relative; 
            background: #000; 
            border: 2px solid #333;
            border-radius: 12px;
            overflow: hidden; /* スクロール不可 */
        }
        
        /* ノード */
        .node { position: absolute; width: 34px; height: 34px; border: 1px solid #444; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #777; background: #111; transform: translate(-50%, -50%); z-index: 10; }
        .node.active { background-color: #00ff88; color: black; font-weight: bold; box-shadow: 0 0 20px #00ff88; border-color: #fff; transform: translate(-50%, -50%) scale(1.3); z-index: 20; }
        
        /* 接続線 */
        .connection { position: absolute; background: #222; height: 1.5px; transform-origin: left center; z-index: 5; }
        .connection.highlight { background: #00ff88; height: 2px; box-shadow: 0 0 8px #00ff88; z-index: 6; }
        
        /* 線上のラベル */
        .line-label { position: absolute; font-size: 14px; font-weight: bold; transform: translate(-50%, -50%); z-index: 15; opacity: 0.5; }
        .line-label.dit { color: #55efc4; }
        .line-label.dah { color: #fab1a0; }
        .line-label.highlight { opacity: 1; font-size: 18px; text-shadow: 0 0 5px currentColor; }

        /* 操作系 */
        #controls { margin-top: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .key-visual { display: flex; gap: 20px; }
        .key { padding: 15px; border: 2px solid #555; border-radius: 8px; background: #333; width: 90px; text-align: center; font-weight: bold; }
        .key.pressing { background: #00ff88; color: black; border-color: #fff; transform: translateY(3px); }
        .label { font-size: 10px; margin-top: 5px; color: #888; text-transform: uppercase; }
        
        #config-bar { background: #222; padding: 8px 20px; border-radius: 8px; display: flex; gap: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="display-area">
        <div id="current-char">START</div>
        <div id="history">-</div>
    </div>

    <div id="screen">
        <div id="tree-canvas" style="width:100%; height:100%; position:relative;"></div>
    </div>

    <div id="controls">
        <div class="key-visual">
            <div><div id="key-straight" class="key">SPACE</div><div class="label">Straight</div></div>
            <div><div id="key-left" class="key">←</div><div class="label">DIT</div></div>
            <div><div id="key-right" class="key">→</div><div class="label">DAH</div></div>
        </div>
        <div id="config-bar">
            <label><input type="checkbox" id="paddle-reverse"> 左右反転 (Reverse)</label>
            <button onclick="resetTree()" style="cursor:pointer">RESET (ESC)</button>
        </div>
    </div>

    <script>
        const alphabet = [
            {char: "START", code: ""},
            {char: "E", code: "."}, {char: "T", code: "-"},
            {char: "I", code: ".."}, {char: "A", code: ".-"}, {char: "N", code: "-."}, {char: "M", code: "--"},
            {char: "S", code: "..."}, {char: "U", code: "..-"}, {char: "R", code: ".-."}, {char: "W", code: ".--"},
            {char: "D", code: "-.."}, {char: "K", code: "-.-"}, {char: "G", code: "--."}, {char: "O", code: "---"},
            {char: "H", code: "...."}, {char: "V", code: "...-"}, {char: "F", code: "..-."}, {char: "L", code: ".-.."},
            {char: "P", code: ".--."}, {char: "J", code: ".---"}, {char: "B", code: "-..."}, {char: "X", code: "-..-"},
            {char: "C", code: "-.-."}, {char: "Y", code: "-.--"}, {char: "Q", code: "--.-"}, {char: "Z", code: "--.."}
        ];

        let currentIndex = 0;
        let pressStartTime = 0;

        function init() {
            const canvas = document.getElementById('tree-canvas');
            const W = canvas.clientWidth;
            const H = canvas.clientHeight;
            
            alphabet.forEach((item, index) => {
                const level = item.code.length;
                const y = 40 + (level * (H / 5.5));
                let x = W / 2;
                
                // 二分木の幅をレベルごとに計算
                for(let i=0; i<level; i++) {
                    const step = W / Math.pow(2, i + 1.5);
                    x += (item.code[i] === '.' ? step : -step);
                }
                item.x = x; item.y = y;

                // ノード作成
                const div = document.createElement('div');
                div.className = 'node';
                div.id = `n-${index}`;
                div.innerText = item.char;
                div.style.left = x + 'px';
                div.style.top = y + 'px';
                canvas.appendChild(div);

                // 線とラベル
                if(level > 0) {
                    const parent = alphabet[alphabet.findIndex(a => a.code === item.code.slice(0, -1))];
                    const isDit = item.code.slice(-1) === '.';
                    
                    const dx = x - parent.x, dy = y - parent.y;
                    const len = Math.sqrt(dx*dx + dy*dy);
                    const ang = Math.atan2(dy, dx) * 180 / Math.PI;

                    const line = document.createElement('div');
                    line.className = 'connection';
                    line.id = `l-${index}`;
                    line.style.width = len + 'px';
                    line.style.left = parent.x + 'px';
                    line.style.top = parent.y + 'px';
                    line.style.transform = `rotate(${ang}deg)`;
                    canvas.appendChild(line);

                    const lbl = document.createElement('div');
                    lbl.className = `line-label ${isDit ? 'dit' : 'dah'}`;
                    lbl.id = `lbl-${index}`;
                    lbl.innerText = isDit ? '・' : '－';
                    lbl.style.left = (parent.x + x)/2 + 'px';
                    lbl.style.top = (parent.y + y)/2 + 'px';
                    canvas.appendChild(lbl);
                }
            });
            update();
        }

        function update() {
            document.querySelectorAll('.node, .connection, .line-label').forEach(el => el.classList.remove('active', 'highlight'));
            document.getElementById(`n-${currentIndex}`).classList.add('active');
            document.getElementById('current-char').innerText = alphabet[currentIndex].char;
            
            let temp = currentIndex;
            let hist = [];
            while(temp > 0) {
                document.getElementById(`l-${temp}`).classList.add('highlight');
                document.getElementById(`lbl-${temp}`).classList.add('highlight');
                const item = alphabet[temp];
                hist.unshift(item.code.slice(-1) === '.' ? '・' : '－');
                temp = alphabet.findIndex(a => a.code === item.code.slice(0, -1));
            }
            document.getElementById('history').innerText = hist.length ? hist.join(' ') : "-";
        }

        function move(type) {
            const nextCode = alphabet[currentIndex].code + (type === 'dit' ? '.' : '-');
            const idx = alphabet.findIndex(a => a.code === nextCode);
            if(idx !== -1) { currentIndex = idx; update(); }
        }

        function resetTree() { currentIndex = 0; update(); }

        window.addEventListener('keydown', e => {
            if(e.repeat) return;
            if(e.code === 'Space') { pressStartTime = Date.now(); document.getElementById('key-straight').classList.add('pressing'); e.preventDefault(); }
            if(e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
                const rev = document.getElementById('paddle-reverse').checked;
                const isDit = (e.code === 'ArrowLeft' && !rev) || (e.code === 'ArrowRight' && rev);
                document.getElementById(e.code === 'ArrowLeft' ? 'key-left' : 'key-right').classList.add('pressing');
                move(isDit ? 'dit' : 'dah');
                e.preventDefault();
            }
            if(e.code === 'Escape') resetTree();
        });

        window.addEventListener('keyup', e => {
            if(e.code === 'Space') {
                move(Date.now() - pressStartTime < 200 ? 'dit' : 'dah');
                document.getElementById('key-straight').classList.remove('pressing');
            }
            if(e.code.includes('Arrow')) document.querySelectorAll('.key').forEach(k => k.classList.remove('pressing'));
        });

        window.onload = init;
    </script>
</body>
</html>
